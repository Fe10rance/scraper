name: pickin-update

on:
  schedule:
    - cron: '0 3 * * *'
    - cron: '0 4 */5 * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'deals | prices | all'
        required: true
        default: 'all'

jobs:
  update-deals:
    name: update-deals
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 3 * * *'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python scraper_headless.py --mode deals
        env:
          PICKIN_API: ${{ secrets.PICKIN_API }}

      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/deals_latest.json
          git pull --rebase origin main || true
          git diff --staged --quiet || git commit -m "deals update $(date '+%Y-%m-%d')"
          git push || true



  update-prices:
    name: update-prices
    runs-on: ubuntu-latest
    needs: update-deals
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 4 */5 * *'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        run: python scraper_headless.py --mode prices
        env:
          PICKIN_API: ${{ secrets.PICKIN_API }}

      - name: Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices_latest.json
          git commit -m "prices update $(date '+%Y-%m-%d')" || true
          git pull --rebase origin main
          git push
